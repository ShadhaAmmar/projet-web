spring:
  application:
    name: Gateway
  cloud:
    discovery:
      enabled: true
    loadbalancer:
      eureka:
        approximate-zone-from-hostname: true
      zone:  ${eureka.instance.metadata-map.zone}

    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: true
      httpclient:
        connect-timeout: 5000
        response-timeout: 30s
        wiretap: false
      httpserver:
        wiretap: false
      metrics:
        enabled: true
        tags:
          path:
            enabled: true
      loadbalancer:
        use404: false
      routes:
        # ─── CORE SERVICE ROUTES ───────────────────────────────────────────────
        - id: research-public
          uri: lb://CORE-SERVICE
          predicates:
            - Path=/api/public/**
          filters:
            - TokenRelay=
            - name: CircuitBreaker
              args:
                name: researchCB
                fallbackUri: forward:/fallback/research
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40

        - id: research-user
          uri: lb://CORE-SERVICE
          predicates:
            - Path=/api/user/**
          filters:
            - TokenRelay=
            - name: CircuitBreaker
              args:
                name: researchCB
                fallbackUri: forward:/fallback/research

        - id: research-moderateur
          uri: lb://CORE-SERVICE
          predicates:
            - Path=/api/moderateur/**
          filters:
            - TokenRelay=
            - name: CircuitBreaker
              args:
                name: researchCB
                fallbackUri: forward:/fallback/research

        - id: research-admin
          uri: lb://CORE-SERVICE
          predicates:
            - Path=/api/admin/**
          filters:
            - TokenRelay=
            - name: CircuitBreaker
              args:
                name: researchCB
                fallbackUri: forward:/fallback/research

        - id: research-files
          uri: lb://CORE-SERVICE
          predicates:
            - Path=/api/files/**
          filters:
            - TokenRelay=
            - name: CircuitBreaker
              args:
                name: researchCB
                fallbackUri: forward:/fallback/research

        # ─── AUTH SERVICE ROUTES ──────────────────────────────────────────────

        # Public: user self-registration (no token needed)
        - id: auth-register
          uri: lb://AUTHORIZATIONSERVICE
          predicates:
            - Path=/api/v1/users/register
          filters:
            - name: CircuitBreaker
              args:
                name: authCB
                fallbackUri: forward:/fallback/auth

        # Public: login + refresh (OAuth2 tokens issued here, no Bearer needed)
        - id: auth-login
          uri: lb://AUTHORIZATIONSERVICE
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: authCB
                fallbackUri: forward:/fallback/auth

        # Admin-only: user creation, role/authority/client management
        - id: auth-admin-users
          uri: lb://AUTHORIZATIONSERVICE
          predicates:
            - Path=/api/v1/users/**
          filters:
            - TokenRelay=
            - name: CircuitBreaker
              args:
                name: authCB
                fallbackUri: forward:/fallback/auth

        - id: auth-admin-roles
          uri: lb://AUTHORIZATIONSERVICE
          predicates:
            - Path=/api/v1/roles/**
          filters:
            - TokenRelay=
            - name: CircuitBreaker
              args:
                name: authCB
                fallbackUri: forward:/fallback/auth

        - id: auth-admin-authorities
          uri: lb://AUTHORIZATIONSERVICE
          predicates:
            - Path=/api/v1/authorities/**
          filters:
            - TokenRelay=
            - name: CircuitBreaker
              args:
                name: authCB
                fallbackUri: forward:/fallback/auth

        - id: auth-server-oauth2
          uri: lb://AUTHORIZATIONSERVICE
          predicates:
            - Path=/oauth2/**
          filters:
            - name: CircuitBreaker
              args:
                name: authCB
                fallbackUri: forward:/fallback/auth

        - id: auth-server-login
          uri: lb://AUTHORIZATIONSERVICE
          predicates:
            - Path=/login/**
          filters:
            - name: CircuitBreaker
              args:
                name: authCB
                fallbackUri: forward:/fallback/auth

        - id: auth-admin-clients
          uri: lb://AUTHORIZATIONSERVICE
          predicates:
            - Path=/api/v1/clients/**
          filters:
            - TokenRelay=
            - name: CircuitBreaker
              args:
                name: authCB
                fallbackUri: forward:/fallback/auth

        # ─── SWAGGER / API DOCS ROUTES ────────────────────────────────────────
        - id: core-service-docs
          uri: lb://CORE-SERVICE
          predicates:
            - Path=/core-service/v3/api-docs
          filters:
            - RewritePath=/core-service/v3/api-docs, /v3/api-docs

        - id: auth-service-docs
          uri: lb://AUTHORIZATIONSERVICE
          predicates:
            - Path=/auth-service/v3/api-docs
          filters:
            - RewritePath=/auth-service/v3/api-docs, /v3/api-docs

        # ─── AI SERVICE ROUTES ────────────────────────────────────────────────
        - id: ai-service
          uri: lb://ai-service
          predicates:
            - Path=/ai/**
          filters:
            - StripPrefix=0

    circuitbreaker:
      resilience4j:
        enabled: true
        disable-time-limiter: false
        enable-semaphore-default-bulkhead: true
      bulkhead:
        resilience4j:
          enabled: true



# ============================================
# RESOURCE SERVER CONFIGURATION
# ============================================

  security:
    oauth2:
      client:
        registration:
          gateway:
            provider: auth-server
            client-id: gatewayservice-QGRiX424PE_LPZlC-CcURA
            client-secret: AimpZwDKNi8AqDBHwbaKUc2M5aYIeFSDwzB72iAnEQI
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost:8080/login/oauth2/code/gateway"
            scope: openid, profile
