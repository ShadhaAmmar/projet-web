server:
  shutdown: graceful
  port: 8080
  netty:
    connection-timeout: 30s
    idle-timeout: 60s
  forward-headers-strategy: framework
  ssl:
    enabled: ${SSL_ENABLED:true}
    key-store: ${SSL_KEYSTORE:/home/chihebellefi/certs/keystore.p12}
    key-store-password: ${SSL_KEYSTORE_PASSWORD:password}
    key-store-type: PKCS12
    key-alias: ${SSL_KEY_ALIAS:tomcat}
    # Trust store for connecting to Eureka
    trust-store: ${SSL_TRUSTSTORE:/home/chihebellefi/certs/keystore.p12}
    trust-store-password: ${SSL_TRUSTSTORE_PASSWORD:password}
    trust-store-type: PKCS12

# ============================================
# EUREKA CLIENT CONFIGURATION
# ============================================

eureka:
  client:
    service-url:
      defaultZone: https://user:password@localhost:8761/eureka/
    enabled: true
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 10
    disable-delta: false
    healthcheck:
      enabled: true
    refresh:
      enable: true
    region: us-east-1
    availability-zones:
      us-east-1: zone1, zone2
    prefer-same-zone-eureka: true
    webclient:
      enabled: false
    timeout:
      connect-timeout: 5000
      connect-request-timeout: 8000
      socket-timeout: 10000
    tls:
      enabled: true
      key-store: file:/home/chihebellefi/certs/keystore.p12
      key-store-type: PKCS12
      key-store-password: ${SSL_KEYSTORE_PASSWORD:password}
      key-password: ${SSL_KEY_PASSWORD:password}
      trust-store: file:/home/chihebellefi/certs/keystore.p12
      trust-store-password: ${SSL_TRUSTSTORE_PASSWORD:password}
      trust-store-type: PKCS12
    eureka-server-connect-timeout-seconds: 5
    eureka-server-read-timeout-seconds: 8
    eureka-server-total-connections: 200
    eureka-server-total-connections-per-host: 50
    eureka-connection-idle-timeout-seconds: 30
    filter-only-up-instances: true
    log-delta-diff: true
    g-zip-content: true
  instance:
    hostname: ${HOSTNAME:localhost}
    ip-address: 127.0.0.1
    prefer-ip-address: false
    non-secure-port: 8080
    non-secure-port-enabled: false
    secure-port: 8080
    secure-port-enabled: true
    status-page-url: https://${eureka.instance.hostname}:${eureka.instance.secure-port}/actuator/info
    health-check-url: https://${eureka.instance.hostname}:${eureka.instance.secure-port}/actuator/health
    home-page-url: https://${eureka.instance.hostname}:${eureka.instance.secure-port}/
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 60
    metadata-map:
      zone: zone1
      version: 1.0.0
      profile: dev
    initial-status: UP

