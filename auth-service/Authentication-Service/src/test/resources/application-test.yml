spring:
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/schema.sql
  autoconfigure:
    exclude: org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration, org.springframework.boot.data.redis.autoconfigure.health.DataRedisHealthContributorAutoConfiguration, org.springframework.boot.data.redis.autoconfigure.DataRedisReactiveAutoConfiguration
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
